<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🏆 Achievements – ClimbUp</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      background: #f5f6fa;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin-top: 40px;
      margin-bottom: 60px;
    }

    h2 {
      font-weight: 700;
      color: #333;
      margin-bottom: 20px;
    }

    .achievement-card {
      position: relative;
      border-radius: 1rem;
      padding: 1.5rem 1rem;
      text-align: center;
      background: linear-gradient(145deg,#fff,#f0f0f0);
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .achievement-card:hover {
      transform: translateY(-7px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.18);
    }

    /* 🔥 FIXED LOCK STYLE */
	.locked {
	  opacity: 0.85;
	  filter: grayscale(40%);
	  transform: scale(0.98);
	}
	
	.locked:hover {
	  opacity: 1;
	  filter: grayscale(20%);
	}

    .locked::after {
      content: "🔒";
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 1.4rem;
    }

    .achievement-icon {
      font-size: 3rem;
      margin-bottom: 0.6rem;
      color: #ffb400;
    }

    .locked .achievement-icon {
      color: #bbb;
    }

    .achievement-title {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
      color: #333;
    }

    .achievement-desc {
      font-size: 0.9rem;
      color: #666;
      min-height: 40px;
    }

    .newly-unlocked {
      border: 2px solid gold;
      box-shadow: 0 0 15px gold;
      animation: glowFade 3s ease-in-out;
    }

    @keyframes glowFade {
      0%   { box-shadow: 0 0 15px 5px #FFD700; }
      50%  { box-shadow: 0 0 10px 3px #FFB400; }
      100% { box-shadow: none; }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: #333;
      text-decoration: none;
      margin-bottom: 20px;
    }

    .back-link:hover {
      color: #0056b3;
      transform: translateX(-4px);
    }

    .empty-state {
      text-align: center;
      color: #777;
      margin-top: 20px;
    }
  </style>
</head>

<body>

	<div class="container">

	  <a href="/dashboard" class="back-link">
	    <i class="bi bi-arrow-left-circle"></i> Back to Dashboard
	  </a>

	  <h2>🏅 Newly Unlocked</h2>
	  <div id="new-achievements" class="row g-4 mb-4"></div>

	  <h2>🎯 Customized User Goals</h2>
	  <div id="custom-achievements" class="row g-4 mb-4"></div>

	  <h2>
	    <span id="toggle-template-goals" style="cursor:pointer; color:#333;">
	      📜 Default Template Goals
	    </span>
	  </h2>
	  <div id="template-achievements" class="row g-4 mb-4" style="display:none;"></div>

	</div>

	<script>
	let isRefreshing = false;

	function createAchievementCard(a) {
	  const col = document.createElement('div');
	  col.className = 'col-sm-6 col-md-4';

	  const card = document.createElement('div');
	  card.className = 'achievement-card';

	  if (!a.unlocked) card.classList.add('locked');
	  if (a.newlyUnlocked) card.classList.add('newly-unlocked');

	  card.innerHTML = `
	    <div class="achievement-icon">
	      <i class="bi ${a.icon || 'bi-trophy'}"></i>
	    </div>
	    <div class="achievement-title">${a.title}</div>
	    <div class="achievement-desc">${a.description || ''}</div>
	  `;

	  col.appendChild(card);
	  return col;
	}

	function triggerConfettiOnce() {
	  confetti({
	    particleCount: 120,
	    spread: 80,
	    origin: { y: 0.6 }
	  });
	}

	function renderAchievements(data) {
	  const customGrid = document.getElementById('custom-achievements');
	  const templateGrid = document.getElementById('template-achievements');
	  const newGrid = document.getElementById('new-achievements');

	  customGrid.innerHTML = '';
	  templateGrid.innerHTML = '';
	  newGrid.innerHTML = '';

	  let hasNewUnlocks = false;

	  const customGoals = data.customGoals || data.goals || [];
	  const defaultTemplates = data.defaultTemplates || [];

	  // Customized user goals
	  customGoals.forEach(a => {
	    customGrid.appendChild(createAchievementCard(a));
	    if (a.newlyUnlocked) {
	      hasNewUnlocks = true;
	      newGrid.appendChild(createAchievementCard(a));
	    }
	  });

	  // Default template goals
	  defaultTemplates.forEach(a => {
	    templateGrid.appendChild(createAchievementCard(a));
	    if (a.newlyUnlocked) {
	      hasNewUnlocks = true;
	      newGrid.appendChild(createAchievementCard(a));
	    }
	  });

	  if (!hasNewUnlocks) {
	    newGrid.innerHTML = `<p class="text-muted">No new achievements yet. Keep grinding 🔥</p>`;
	  } else {
	    triggerConfettiOnce();
	  }
	}


	async function fetchAchievements() {
	  try {
	    const res = await axios.get('/api/achievements', { withCredentials: true });
	    console.log("DATA:", res.data);
	    renderAchievements(res.data);
	    await axios.post('/api/achievements/seen', {}, { withCredentials: true });
	  } catch (err) {
	    console.error('Error fetching achievements', err);
	  }
	}

	async function refreshAchievements() {
	  if (isRefreshing) return;
	  isRefreshing = true;

	  try {
	    await axios.post('/api/achievements/evaluate', {}, { withCredentials: true });
	    const res = await axios.get('/api/achievements', { withCredentials: true });
	    renderAchievements(res.data);
	  } catch (err) {
	    console.error('Error refreshing achievements', err);
	  } finally {
	    isRefreshing = false;
	  }
	}

	document.addEventListener('DOMContentLoaded', () => {
	  fetchAchievements();

	  const toggle = document.getElementById('toggle-template-goals');
	  const templateSection = document.getElementById('template-achievements');

	  toggle.addEventListener('click', () => {
	    if (templateSection.style.display === 'none') {
	      templateSection.style.display = 'flex';
	      toggle.style.color = '#0056b3';
	      toggle.innerHTML = '📜 Hide Template Goals';
	    } else {
	      templateSection.style.display = 'none';
	      toggle.style.color = '#333';
	      toggle.innerHTML = '📜 Default Template Goals';
	    }
	  });
	});

	window.updateAchievements = refreshAchievements;
	</script>


</body>
</html>
