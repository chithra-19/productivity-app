<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <title>All Tasks – ClimbUp</title>
  <style>
    :root {
      --primary: #0284c7;
      --primary-dark: #0369a1;
      --success: #16a34a;
      --success-dark: #138c3b;
      --warning: #facc15;
      --bg: #f5f7fa;
      --text: #1e293b;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    body {
      font-family: "Inter", Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd 0%, #f8fbff 100%);
      color: #1e293b;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 2.5rem auto;
      background: var(--card-bg);
      padding: 2rem 2.5rem;
      border-radius: 14px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease-in-out;
    }

    .container:hover {
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }

    h2 {
      margin-bottom: 1.5rem;
      color: var(--primary-dark);
      text-align: center;
      font-size: 1.75rem;
      letter-spacing: 0.5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 1rem 1.2rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }

    th {
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      border-bottom: 2px solid var(--primary-dark);
    }

    tr:hover {
      background: #f1f5f9;
      transition: background 0.2s ease-in-out;
    }

    .status-done,
    .status-pending {
      display: inline-block;
      padding: 0.3rem 0.75rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .status-done {
      background: rgba(22,163,74,0.1);
      color: var(--success-dark);
    }

    .status-pending {
      background: rgba(250,204,21,0.15);
      color: #b45309;
    }

    .back-arrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 16px;
      color: black;
      text-decoration: none;
      margin: 20px;
      transition: 0.2s ease-in-out;
    }

    .back-arrow:hover {
      color: #0056b3;
      transform: translateX(-3px);
    }

    @media (max-width: 768px) {
      .container { padding: 1.5rem; }
      th, td { padding: 0.75rem; font-size: 0.9rem; }
      h2 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <a href="/dashboard" class="back-arrow">
    <i class="bi bi-arrow-left-circle"></i> Back to Dashboard
  </a>

  <div class="container">
    <h2>All Tasks</h2>

    <table>
      <thead>
        <tr>
          <th>
            <a th:href="@{/tasks/all(page=0, size=${size}, sortField='title', sortDir=${sortField == 'title' and sortDir == 'asc' ? 'desc' : 'asc'})}"
               style="color:white; text-decoration:none;">
              TITLE <i th:class="${sortField == 'title'} ? (${sortDir == 'asc'} ? 'bi bi-arrow-up' : 'bi bi-arrow-down') : 'bi bi-arrow-down-up'"></i>
            </a>
          </th>
          <th>DESCRIPTION</th>
          <th>
            <a th:href="@{/tasks/all(page=0, size=${size}, sortField='completed', sortDir=${sortField == 'completed' and sortDir == 'asc' ? 'desc' : 'asc'})}"
               style="color:white; text-decoration:none;">
              STATUS <i th:class="${sortField == 'completed'} ? (${sortDir == 'asc'} ? 'bi bi-arrow-up' : 'bi bi-arrow-down') : 'bi bi-arrow-down-up'"></i>
            </a>
          </th>
          <th>
            <a th:href="@{/tasks/all(page=0, size=${size}, sortField='dueDate', sortDir=${sortField == 'dueDate' and sortDir == 'asc' ? 'desc' : 'asc'})}"
               style="color:white; text-decoration:none;">
              DUE DATE <i th:class="${sortField == 'dueDate'} ? (${sortDir == 'asc'} ? 'bi bi-arrow-up' : 'bi bi-arrow-down') : 'bi bi-arrow-down-up'"></i>
            </a>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="task : ${tasks}">
          <td th:text="${task.title}"></td>
          <td th:text="${task.description}"></td>
          <td>
            <span th:class="${task.completed} ? 'status-done' : 'status-pending'"
                  th:text="${task.completed} ? 'Done' : 'Not Done'"></span>
          </td>
          <td th:text="${task.dueDate} ?: '-'"></td>
        </tr>

        <!-- Empty state -->
        <tr th:if="${#lists.isEmpty(tasks)}">
          <td colspan="4" class="text-center text-muted py-4">No tasks found.</td>
        </tr>
      </tbody>
    </table>

    <!-- PAGINATION -->
    <nav th:if="${totalPages > 1}" class="mt-4">
      <ul class="pagination justify-content-center">

        <!-- Previous -->
        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
          <a class="page-link"
             th:href="@{/tasks/all(page=${currentPage - 1}, size=${size}, sortField=${sortField}, sortDir=${sortDir})}">
            Previous
          </a>
        </li>

        <!-- Page numbers -->
        <li class="page-item"
            th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
            th:classappend="${i == currentPage} ? 'active'">
          <a class="page-link"
             th:href="@{/tasks/all(page=${i}, size=${size}, sortField=${sortField}, sortDir=${sortDir})}"
             th:text="${i + 1}">
          </a>
        </li>

        <!-- Next -->
        <li class="page-item"
            th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
          <a class="page-link"
             th:href="@{/tasks/all(page=${currentPage + 1}, size=${size}, sortField=${sortField}, sortDir=${sortDir})}">
            Next
          </a>
        </li>

      </ul>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
