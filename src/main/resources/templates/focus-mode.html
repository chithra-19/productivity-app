<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Focus Mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- CSS -->
<link rel="stylesheet" href="/css/focus-mode.css">
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light">
<div class="app-container">
	<!-- Header -->
	<h1>Focus Mode</h1>

	<!-- Theme Toggle -->
	<div class="theme-toggle">
	  <button id="lightBtn" class="active">Light Mode</button>
	  <button id="darkBtn">Dark Mode</button>
	</div>

	<!-- Main Content -->
	<div class="main-content">

	  <!-- ================= LEFT COLUMN ================= -->
	  <div class="left-column">

	    <!-- Timer Card -->
	    <div class="card timer-card">
	      <div class="timer-wrapper">

	        <svg class="progress-ring" width="180" height="180">
	          <circle
	            class="progress-ring-circle"
	            stroke="#9f6cff"
	            stroke-width="8"
	            fill="transparent"
	            r="84"
	            cx="90"
	            cy="90"
	          />
	        </svg>

	        <div class="timer" id="timer">25:00</div>
	      </div>

	      <!-- Controls -->
	      <div class="controls">
	        <button id="startBtn">Start</button>
			<button id ="continueBtn">Continue</button>
	        <button id="pauseBtn">Pause</button>
	        <button id="resetBtn">Reset</button>
	      </div>
	    </div>

	    <!-- Session Type Card -->
	    <div class="card session-card">
	      <div class="session-types">

			<button class="session-type active" data-minutes="25" data-type="FOCUS">Focus</button>
			<button class="session-type" data-minutes="5" data-type="BREAK">Break</button>
			<button class="session-type" data-minutes="15" data-type="LONG_BREAK">Long Break</button>

	        <div class="session-custom">
	          Custom<br>
	          <input
	            type="number"
	            id="customDuration"
	            min="1"
	            max="180"
	            value="25"
	          > min
	        </div>

	      </div>
	    </div>

	  </div>

	  <!-- ================= RIGHT COLUMN ================= -->
	  <div class="right-column">

	    <!-- Daily Goal Analytics -->
		<div class="card goal-card">
		  <h3>Daily Focus Goal</h3>

		  <div class="goal-input-row">
		    <input type="number" id="dailyGoalHours" min="0" max="24" value="5"> h
		    <input type="number" id="dailyGoalMins" min="0" max="59" value="30"> m
		    <button id="saveBtn" class="btn btn-sm btn-primary">Save Goal</button>
		  </div>

		  <div class="goal-summary-pill">
		    <span id="goalDone">0h 0m</span> /
		    <span id="goalTotal">5h 30m</span>
		  </div>
		  

		  <div class="progress-bar">
		    <div class="progress-fill" id="goalProgress"></div>
		  </div>

		  <div id="remainingGoal" class="goal-remaining-text">5h 30m remaining</div>

		  <div class="goal-status" id="goalStatus">Let’s get started 🚀</div>
		</div>

	    <!-- Stats Card -->
	    <div class="card stats-card">
	      <div class="stats-bar">
			
	        <div class="stat">
	          <h2 id="sessionsCompleted">0</h2>
	          <p>Sessions Completed Today</p>
	        </div>

	    </div>
		
		<!-- Add this somewhere in the right-column, e.g., above history-card -->
		<div class="card">
		  <a href="/dashboard/focus-sessions" class="view-sessions-btn">View All Sessions</a>
		</div>


	  </div>
	</div>
	</div><div id="toast" class="toast">Session Complete! ✅</div>
	<!-- JS -->
	<script src="/js/focus-mode.js"></script>
	</body></html>
