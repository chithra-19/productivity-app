<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <title>All Tasks – ClimbUp</title>
  <style>
    /* 🌙 Base styles */
    :root {
      --primary: #0284c7;
      --primary-dark: #0369a1;
      --success: #16a34a;
      --success-dark: #138c3b;
      --warning: #facc15;
      --bg: #f5f7fa;
      --text: #1e293b;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    body {
  font-family: "Inter", Arial, sans-serif;
  background: linear-gradient(135deg, #e3f2fd 0%, #f8fbff 100%);
  color: #1e293b;
  margin: 0;
  padding: 0;
  min-height: 100vh;
}
    

    .container {
      max-width: 1000px;
      margin: 2.5rem auto;
      background: var(--card-bg);
      padding: 2rem 2.5rem;
      border-radius: 14px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease-in-out;
    }

    .container:hover {
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }

    h2 {
      margin-bottom: 1.5rem;
      color: var(--primary-dark);
      text-align: center;
      font-size: 1.75rem;
      letter-spacing: 0.5px;
    }

    /* 📋 Table styling */
    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 1rem 1.2rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }

    th {
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      border-bottom: 2px solid var(--primary-dark);
    }

    tr:hover {
      background: #f1f5f9;
      transition: background 0.2s ease-in-out;
    }

    /* ✅ Buttons */
    button {
      padding: 0.5rem 0.9rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .btn-complete {
      background: var(--success);
      color: white;
      box-shadow: 0 2px 5px rgba(22,163,74,0.3);
    }

    .btn-complete:hover {
      background: var(--success-dark);
      transform: scale(1.05);
    }

    /* 📊 Status badges */
    .status-done,
    .status-pending {
      display: inline-block;
      padding: 0.3rem 0.75rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .status-done {
      background: rgba(22,163,74,0.1);
      color: var(--success-dark);
    }

    .status-pending {
      background: rgba(250,204,21,0.15);
      color: #b45309;
    }
	
	 .back-arrow {
	  display: inline-flex;
	  align-items: center;
	  gap: 6px;
	  font-weight: 600;
	  font-size: 16px;
	  color: black;
	  text-decoration: none;
	  margin: 20px;
	  transition: 0.2s ease-in-out;
	}

	.back-arrow:hover {
	  color: #0056b3;
	  transform: translateX(-3px);
	}

    /* 📱 Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 1.5rem;
      }

      th, td {
        padding: 0.75rem;
        font-size: 0.9rem;
      }

      h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <a href="/dashboard" class="back-arrow">
    <i class="bi bi-arrow-left-circle"></i> Back to Dashboard
  </a>

  <div class="container">
    <h2>All Tasks</h2>

    <table>
      <thead>
        <tr>
          <th onclick="sortTable('title')">Title <i class="bi bi-chevron-expand"></i></th>
          <th>Description</th>
          <th>Status</th>
          <th onclick="sortTable('dueDate')">Due Date <i class="bi bi-chevron-expand"></i></th>
          <th>Action</th>
        </tr>
      </thead>
	  <tbody>
	    <tr th:each="task : ${tasks}">
	      <td th:text="${task.title}"></td>
	      <td th:text="${task.description}"></td>
	      <td>
	        <span th:class="${task.completed} ? 'status-done' : 'status-pending'"
	              th:text="${task.completed} ? 'Done' : 'Pending'"></span>
	      </td>
	      <td th:text="${task.dueDate} ?: '-'"></td>
	      <td>
	        <form th:if="${!task.completed}"
	              th:action="@{/tasks/complete/{id}(id=${task.id})}"
	              method="post">
	          <button class="btn-complete">Mark Done</button>
	        </form>
	      </td>
	    </tr>
	  </tbody>

    </table>

	<nav th:if="${totalPages > 1}" class="mt-4">
	  <ul class="pagination justify-content-center">

	    <!-- Previous -->
	    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
	      <a class="page-link"
	         th:href="@{/tasks/all(page=${currentPage - 1})}">
	        Previous
	      </a>
	    </li>

	    <!-- Page numbers -->
	    <li class="page-item"
	        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
	        th:classappend="${i == currentPage} ? 'active'">
	      <a class="page-link"
	         th:href="@{/tasks/all(page=${i})}"
	         th:text="${i + 1}">
	      </a>
	    </li>

	    <!-- Next -->
	    <li class="page-item"
	        th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
	      <a class="page-link"
	         th:href="@{/tasks/all(page=${currentPage + 1})}">
	        Next
	      </a>
	    </li>

	  </ul>
	</nav>

  </div>

<script>
let currentPage = 1;
let pageSize = 10;
let sortField = 'title';
let sortDir = 'asc';

// Load tasks from backend and render table
async function loadTasks() {
    try {
        const res = await fetch(`/tasks/all?page=${currentPage}&size=${pageSize}&sortField=${sortField}&sortDir=${sortDir}`);

        const data = await res.json();

        renderTable(data.tasks);
        renderPagination(data.totalPages);
    } catch(err) {
        console.error(err);
        
    }
}

// Render table rows
function renderTable(tasks) {
    const tbody = document.querySelector('table tbody');
    tbody.innerHTML = ''; // clear previous rows

    tasks.forEach(task => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${task.title}</td>
            <td>${task.description}</td>
            <td>
                <span class="${task.completed ? 'status-done' : 'status-pending'}">
                    ${task.completed ? 'Done' : 'Pending'}
                </span>
            </td>
            <td>${task.dueDate || '-'}</td>
            <td>
                ${!task.completed ? `<button onclick="markTaskCompleted(${task.id}, this)" class="btn-complete">Mark Done</button>` : ''}
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// Render pagination buttons
function renderPagination(totalPages) {
    const pagination = document.getElementById('pagination');
    pagination.innerHTML = '';

    const prevLi = document.createElement('li');
    prevLi.className = `page-item ${currentPage===1 ? 'disabled' : ''}`;
    prevLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage-1})">Previous</a>`;
    pagination.appendChild(prevLi);

    for(let i=1;i<=totalPages;i++){
        const li = document.createElement('li');
        li.className = `page-item ${i===currentPage ? 'active' : ''}`;
        li.innerHTML = `<a class="page-link" href="#" onclick="changePage(${i})">${i}</a>`;
        pagination.appendChild(li);
    }

    const nextLi = document.createElement('li');
    nextLi.className = `page-item ${currentPage===totalPages ? 'disabled' : ''}`;
    nextLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage+1})">Next</a>`;
    pagination.appendChild(nextLi);
}

// Change page
function changePage(page) {
    if(page < 1) return;
    currentPage = page;
    loadTasks();
}

// Sort table
function sortTable(field) {
    if(sortField === field) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortField = field; sortDir = 'asc'; }
    loadTasks();
}

// Mark task as completed
async function markTaskCompleted(taskId, button) {
    try {
        const res = await fetch(`/tasks/complete/${taskId}`, { method: 'POST' });
        if(!res.ok) throw new Error("Failed to mark as done");

        const row = button.closest('tr');
        row.style.transition = 'opacity 0.3s';
        row.style.opacity = 0;
        setTimeout(() => row.remove(), 300);

        // Optional: refresh stats
        const statsRes = await fetch('/dashboard/api/stats');
        if(statsRes.ok){
            const stats = await statsRes.json();
            const scoreElem = document.querySelector("#score");
            const streakElem = document.querySelector("#streak");
            const pendingElem = document.querySelector("#pendingCount");
            if(scoreElem) scoreElem.textContent = stats.score;
            if(streakElem) streakElem.textContent = stats.streak;
            if(pendingElem) pendingElem.textContent = stats.pendingCount;
        }
    } catch(err) {
        console.error(err);
        alert("Failed to mark task as done.");
    }
}

// Initial load
document.addEventListener('DOMContentLoaded', loadTasks);
</script>


</body>
</html>
